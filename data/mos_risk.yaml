# Hand-curated MOS Risk Overlay.
#
# These are *inferences* drawn from publicly available duty descriptions
# (DA PAM 611-21, MCO 1200.18, AFECD, NEC Manual) about non-acoustic risk —
# musculoskeletal joints likely loaded by the job, plus common symptom
# fingerprints. The authoritative VA noise-exposure data lives in the spine
# (`duty_mos_noise.xlsx`); this file only adds musculoskeletal / other
# secondary signals.
#
# Confidence is `medium` across the board because none of these inferences
# are legally authoritative — they're plausible patterns that the agent uses
# as Functional Loss Probes, not as Service Connection evidence.
#
# Every `code` + `branch` must already exist in the spine. The overlay raises
# OverlayError if not.

# ---------------- Army (MOS) ----------------

- code: "11B"
  branch: "Army"
  title: "Infantryman"
  likely_anatomy: ["knee", "back", "ankle", "hip", "shoulder"]
  likely_symptoms: ["chronic-back-pain", "knee-pain"]
  rationale: >-
    Foot-mobile combat role with sustained ruck-march load (often 60-100 lbs)
    over uneven terrain. Repeated jumping, kneeling firing positions, and
    body armor compress the lumbar spine and load the knees and ankles.
  sources:
    - { type: "duty-description-inference", confidence: "medium" }

